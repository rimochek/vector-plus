version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: vector_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - vector_network

  backend:
    build:
      context: ./backend
    container_name: vector_backend
    restart: always
    depends_on:
      - postgres
    env_file:
      - .env
    ports:
      - "5000:5000"
    networks:
      - vector_network

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
    container_name: vector_frontend
    restart: always
    depends_on:
      - backend
    env_file:
      - .env
    ports:
      - "3000:3000"
    networks:
      - vector_network

  nginx:
    image: nginx:stable-alpine
    container_name: vector_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - vector_network

volumes:
  postgres_data:

networks:
  vector_network:
    driver: bridge
